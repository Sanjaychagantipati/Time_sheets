services:
  - type: web
    name: vergil-tempo-api

    runtime: java

    rootDir: backend

    buildCommand: mvn clean package

    startCommand: java -jar target/timesheets-0.0.1-SNAPSHOT.jar

    envVars:
      - key: DB_URL
        sync: false

      - key: DB_USERNAME
        sync: false

      - key: DB_PASSWORD
        sync: false

      - key: JWT_SECRET
        sync: false

      - key: ALLOWED_ORIGINS
        sync: false