# --- VERGIL TEMPO BACKEND CONFIGURATION ---
server.port=8081
spring.application.name=timesheets

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/vergil_tempo
spring.datasource.username=postgres
spring.datasource.password=1408

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=your-secret-key

# Enable logging customization if desired
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO

