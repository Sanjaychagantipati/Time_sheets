# --- VERGIL TEMPO BACKEND CONFIGURATION ---
server.port=${PORT:8081}
spring.application.name=timesheets

# PostgreSQL Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vergil_tempo}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1408}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key}

# CORS Configuration
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

# Enable logging customization if desired
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO

